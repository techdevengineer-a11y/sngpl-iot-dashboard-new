name: Deploy to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Update working tree and deploy
        run: |
          set -e
          echo "🚀 Deploying to Azure VM..."
          cd /var/www/sngpl-dashboard
          git fetch origin main
          git reset --hard origin/main
          bash deploy.sh
          echo "🎉 Deployment complete!"
