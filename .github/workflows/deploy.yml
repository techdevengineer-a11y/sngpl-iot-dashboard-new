name: Deploy to production server (AWS)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, X64]   # AWS device-server runner only (Azure VM is ARM64)

    steps:
      - name: Update working tree and deploy
        run: |
          set -e
          echo "🚀 Deploying to AWS server (3.0.105.206)..."
          cd /var/www/sngpl-dashboard
          git fetch origin main
          git reset --hard origin/main
          bash deploy.sh
          echo "🎉 Deployment complete!"
